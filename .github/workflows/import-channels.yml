name: Import film dai canali

# Automazione: quando l'editor web salva channels.json (o ogni giorno, o a mano),
# scrapa i canali YouTube, identifica i NUOVI upload su TMDB e li aggiunge al
# catalogo movies_metadata.json. Lo scraping/identificazione gira in cloud (no PC).
on:
  push:
    paths:
      - channels.json
  schedule:
    - cron: '0 4 * * *'    # ogni giorno alle 04:00 UTC
  workflow_dispatch:        # avvio manuale dalla tab Actions

permissions:
  contents: write

concurrency:
  group: import-channels
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Importa, committa e pusha (con retry su conflitto)
        env:
          META_PATH: ${{ github.workspace }}/movies_metadata.json
          CHANNELS_JSON: ${{ github.workspace }}/channels.json
          ARCHIVE_DIR: ${{ runner.temp }}/archive
          YT_API_KEY: ${{ secrets.YT_API_KEY }}    # YouTube Data API v3 (lista video affidabile da cloud)
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "italiatv-import-bot"
          git config user.email "actions@users.noreply.github.com"
          # Ogni tentativo: riallinea all'ultima versione del remoto, ri-esegue l'import
          # (idempotente: salta i film già presenti) e prova a pushare. Se nel frattempo
          # arriva un altro commit (editor/altra Action), il push è rifiutato → si riprova
          # sulla nuova base, così i film importati NON vanno persi per conflitto.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            ( cd scripts && python catalog_new_uploads.py --apply )
            git add movies_metadata.json
            if git diff --cached --quiet; then
              echo "Nessun nuovo film da importare."
              exit 0
            fi
            git commit -m "Auto-import nuovi film dai canali (GitHub Action)"
            if git push; then
              echo "Push riuscito al tentativo $attempt."
              exit 0
            fi
            echo "Push rifiutato (conflitto), riprovo sull'ultima versione ($attempt)…"
            sleep 3
          done
          echo "Non riuscito dopo 5 tentativi"; exit 1
